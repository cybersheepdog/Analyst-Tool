<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="'DejaVu Sans Mono','Consolas',monospace" font-size="14">
  <rect width="720" height="300" rx="8" fill="#1e1e2e"/>
  <rect width="720" height="30" rx="8" fill="#313244"/>
  <rect y="20" width="720" height="10" fill="#313244"/>
  <circle cx="20" cy="15" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="15" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="15" r="6" fill="#a6e3a1"/>
  <text x="360" y="20" fill="#bac2de" text-anchor="middle" font-size="12">analyst tool — adding a note (copy to clipboard, then type)</text>
  <text x="16" y="58" fill="#6c7086"># copy the trigger to your clipboard:</text>
  <text x="16" y="80"><tspan fill="#89dceb">&gt;&gt;note</tspan><tspan fill="#cdd6f4"> 45.145.66.165</tspan></text>
  <text x="16" y="102" fill="#cdd6f4">Note (#tags inline) &gt; <tspan fill="#f5e0dc">confirmed phishing C2, case #1487 </tspan><tspan fill="#f38ba8">#phishing #c2</tspan></text>
  <text x="16" y="124" fill="#a6e3a1">[+] Note saved for 45.145.66.165 by alice</text>
  <text x="40" y="146" fill="#a6adc8">tags: <tspan fill="#f38ba8">[phishing]</tspan> <tspan fill="#f38ba8">[c2]</tspan></text>
  <text x="40" y="168" fill="#a6adc8" font-style="italic">"confirmed phishing C2, case #1487"</text>
  <text x="16" y="202" fill="#6c7086"># ...or annotate your LAST lookup — no IP to retype:</text>
  <text x="16" y="224"><tspan fill="#89dceb">&gt;&gt;note</tspan><tspan fill="#cdd6f4"> benign — corporate VPN egress, ticket #92 </tspan><tspan fill="#a6e3a1">#fp</tspan></text>
  <text x="16" y="246" fill="#a6e3a1">[+] Note saved for 8.8.8.8 (your last lookup) by bob  <tspan fill="#a6e3a1">[fp]</tspan></text>
  <text x="16" y="276" fill="#a6e3a1">▌</text>
</svg>
