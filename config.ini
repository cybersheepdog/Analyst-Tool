[GENERAL]
# Verify TLS certificates on outbound API calls. Leave as true.
# Set to false ONLY if you are behind a TLS-intercepting proxy or must talk to
# services using self-signed certs: requests will then retry with verification
# disabled on SSL errors, and API clients are built without verification.
ssl_verify = true

[CACHE]
# Cache external lookups (VirusTotal, AbuseIPDB, Shodan, OTX) so repeat
# lookups within freshness_days are served from the DB instead of spending an
# API call. Set enabled = false to turn caching off entirely.
enabled = true
# backend: local (SQLite file, single user) or remote (PostgreSQL, shared team)
backend = local
# A cached result younger than this many days is reused instead of re-querying.
freshness_days = 7
# Local SQLite database file (used when backend = local).
db_path = analyst_cache.db
# Copy an indicator prefixed with this to force a fresh lookup, e.g. !8.8.8.8
force_prefix = !
# Delete cached entries older than this many days at startup (0 = never purge).
purge_days = 0
# Identity recorded in the shared check-log. Blank = your OS login name.
# Give each analyst a unique value when sharing a remote database.
user =
# Window (in days) for the "X users have checked this indicator" notice.
check_window_days = 7
# A re-check by the SAME user within this many minutes is not counted again
# (prevents rapid re-copies from inflating the count).
check_dedup_minutes = 60
# Remote PostgreSQL settings (used only when backend = remote):
host =
port = 5432
dbname =
db_user =
password =
sslmode = prefer

